<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Window Mirror over HTTP + UDP</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 24px;
            background: #f6f8fb;
            color: #102133;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #dde5ee;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(16, 33, 51, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        button {
            border: 1px solid #bfd0e4;
            background: #ffffff;
            color: #0f2a44;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .card {
            border: 1px solid #d7e1ed;
            border-radius: 8px;
            padding: 10px;
            background: #fbfdff;
        }

        video,
        img {
            width: 100%;
            min-height: 180px;
            border-radius: 8px;
            border: 1px solid #d7e1ed;
            background: #0f1720;
        }

        .meta {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teacher Window Mirror (HTTP Source)</h1>
        <p>Klik <strong>Start Sharing Window</strong>, pilih window/tab PowerPoint, lalu server akan publish frame terbaru di endpoint <code>/frame</code>.</p>

        <div class="toolbar">
            <button id="start-share">Start Sharing Window</button>
            <button id="stop-share" disabled>Stop Sharing</button>
        </div>

        <div class="grid">
            <div class="card">
                <strong>Local Shared Window (Teacher)</strong>
                <video id="local-preview" autoplay muted playsinline></video>
            </div>
            <div class="card">
                <strong>Frame Served by HTTP (/frame)</strong>
                <img id="mirrored-frame" alt="Mirrored frame from HTTP server" />
            </div>
        </div>

        <div class="meta" id="status">Connecting...</div>
        <div class="meta" id="stats">-</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
