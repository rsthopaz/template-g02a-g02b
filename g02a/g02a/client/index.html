<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webcam over HTTP + UDP</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 24px;
            background: #f6f8fb;
            color: #102133;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #dde5ee;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(16, 33, 51, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        select {
            padding: 6px 10px;
            border: 1px solid #bfd0e4;
            border-radius: 8px;
            background: #ffffff;
            color: #0f2a44;
        }

        img {
            width: 100%;
            max-width: 760px;
            border-radius: 8px;
            border: 1px solid #d7e1ed;
            background: #0f1720;
        }

        .meta {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Webcam Stream (HTTP Source)</h1>
        <p>Halaman ini hanya menampilkan frame dari endpoint HTTP server.</p>
        <div class="controls">
            <label for="camera-select">Camera:</label>
            <select id="camera-select">
                <option value="0">Camera 0</option>
                <option value="1">Camera 1</option>
            </select>
        </div>
        <img id="http-frame" alt="Processed frame from HTTP server" />
        <div class="meta" id="status">Connecting...</div>
        <div class="meta" id="stats">-</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
